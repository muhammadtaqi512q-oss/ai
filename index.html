<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALARA - Smart AI Search by MUHAMMAD TAQI</title>
  <style>
    /* ALARA Stylish Modern UI - Deep Space Blue & Aurora Gold */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    :root {
      --primary-blue: #0b1e3d;
      --secondary-blue: #162a51;
      --golden: #f5b841;
      --golden-light: #ffdb70;
      --background-gradient: radial-gradient(circle at center, #0b1e3d, #04122f 90%);
      --card-bg: rgba(21, 32, 61, 0.85);
      --text-light: #e8e8e8;
      --text-dark: #001f3f;
      --shadow-glow: 0 0 15px var(--golden-light);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--background-gradient);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1rem 5rem;
      scroll-behavior: smooth;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2.5rem 2rem 3rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      backdrop-filter: saturate(180%) blur(15px);
      user-select: none;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--golden);
      text-shadow: var(--shadow-glow);
    }

    header h1 {
      font-size: 3rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: 0.15rem;
      line-height: 1.1;
    }

    header h3 {
      font-weight: 500;
      margin: 0.25rem 0 0.75rem;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--golden-light);
    }

    .search-box {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    input#query {
      flex-grow: 1;
      font-size: 1.2rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      border: none;
      outline: none;
      background: #112547;
      color: var(--golden-light);
      box-shadow: inset 0 0 8px #ffd64d80;
      transition: box-shadow 0.3s ease, background-color 0.3s ease;
      font-weight: 500;
    }
    input#query::placeholder {
      color: #ffd64daa;
      font-weight: 300;
      font-style: italic;
    }
    input#query:focus {
      background: #152a5e;
      box-shadow: 0 0 12px var(--golden);
      color: #fff;
    }

    button {
      background: var(--golden);
      border: none;
      border-radius: 12px;
      padding: 1rem 2.2rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: 0.12rem;
      box-shadow: 0 6px 12px -3px #c79400cc;
      transition: background-color 0.3s ease, box-shadow 0.25s ease, transform 0.15s ease;
      user-select: none;
    }
    button:hover {
      background: #f7cd4b;
      box-shadow: 0 8px 18px -2px #dcb426dd;
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
      box-shadow: 0 4px 10px -3px #a57c00cc;
    }

    #results {
      max-height: 56vh;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    #results::-webkit-scrollbar {
      width: 7px;
    }
    #results::-webkit-scrollbar-thumb {
      background: var(--golden-light);
      border-radius: 10px;
    }
    #results::-webkit-scrollbar-track {
      background: transparent;
    }

    .result-card {
      background: #152a5e88;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.3rem;
      border-radius: 14px;
      border-left: 6px solid var(--golden);
      box-shadow: 0 0 12px #ffd64d55;
      transition: transform 0.15s ease;
      cursor: pointer;
      user-select: text;
    }
    .result-card:hover {
      transform: translateX(8px);
      box-shadow: 0 0 24px #ffd64daa;
    }

    .result-card a {
      color: var(--golden);
      font-weight: 600;
      font-size: 1.25rem;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 0.5rem;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
      user-select: text;
    }
    .result-card a:hover {
      text-decoration: underline;
    }

    .result-card p {
      color: #d1cecacc;
      font-size: 0.95rem;
      line-height: 1.4;
      user-select: text;
      margin: 0;
      max-height: 6.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Loader & messages */
    #results p.message {
      font-size: 1.15rem;
      text-align: center;
      margin-top: 2rem;
      filter: drop-shadow(0 0 6px var(--golden));
    }

    @media (max-width: 420px) {
      header h1 {
        font-size: 2.25rem;
        letter-spacing: 0.1rem;
      }
      .search-box {
        flex-direction: column;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container" role="main" aria-label="ALARA AI Search Assistant">
    <header>
      <h1>ALARA</h1>
      <h3>Powered by MUHAMMAD TAQI</h3>
    </header>

    <div class="search-box">
      <input
        type="text"
        id="query"
        placeholder="Poochiye jo aap chahte hain..."
        aria-label="Search query"
        autocomplete="off"
        spellcheck="false"
      />
      <button aria-label="Perform search" onclick="performSearch()">Search</button>
    </div>

    <section id="results" aria-live="polite" aria-relevant="additions"></section>
  </div>

  <script>
    async function performSearch() {
      const query = document.getElementById('query').value.trim();
      const resultsDiv = document.getElementById('results');

      if (!query) {
        alert("Kuch toh likhen!");
        return;
      }

      resultsDiv.innerHTML = `<p class="message" style="color: var(--golden);">ALARA is searching for "<strong>${query}</strong>"...</p>`;

      try {
        // Use DuckDuckGo Instant Answer API
        const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&pretty=1&no_redirect=1`;
        const response = await fetch(url);

        if (!response.ok) throw new Error('Network response was not ok');

        const data = await response.json();

        resultsDiv.innerHTML = '';

        // Show Abstract if exists
        if(data.AbstractText) {
          resultsDiv.innerHTML += `
            <article class="result-card">
              <a href="${data.AbstractURL}" target="_blank" rel="noopener noreferrer" aria-label="Direct Answer">${data.Heading || 'Direct Answer'}</a>
              <p>${data.AbstractText}</p>
            </article>`;
        }

        // Show Related Topics (limit 5)
        if (data.RelatedTopics && data.RelatedTopics.length > 0) {
          let count = 0;
          data.RelatedTopics.forEach(item => {
            if (count >= 5) return;
            // Some RelatedTopics are nested topics inside 'Topics' arrays
            if (item.Topics && item.Topics.length > 0) {
              item.Topics.slice(0, 2).forEach(subItem => {
                if(count >= 5) return;
                if(subItem.Text) {
                  resultsDiv.innerHTML += `
                    <article class="result-card">
                      <a href="${subItem.FirstURL}" target="_blank" rel="noopener noreferrer">${subItem.Text.split(' - ')[0] || 'Result'}</a>
                      <p>${subItem.Text}</p>
                    </article>`;
                  count++;
                }
              });
            } else if(item.Text) {
              resultsDiv.innerHTML += `
                <article class="result-card">
                  <a href="${item.FirstURL}" target="_blank" rel="noopener noreferrer">${item.Text.split(' - ')[0] || 'Result'}</a>
                  <p>${item.Text}</p>
                </article>`;
              count++;
            }
          });
        }

        // If nothing found
        if (!data.AbstractText && (!data.RelatedTopics || data.RelatedTopics.length === 0))
          resultsDiv.innerHTML = `<p class="message" style="color: #f44336;">Maaf kijiye, koi data nahi mila. Try another query.</p>`;

      } catch (error) {
        resultsDiv.innerHTML = `<p class="message" style="color: #f44336;">Kuch gadbad hui. Please check your internet connection.</p>`;
        console.error('ALARA Search Error:', error);
      }
    }

    // Optional: Enter key triggers search
    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        performSearch();
      }
    });
  </script>
</body>
</html>
