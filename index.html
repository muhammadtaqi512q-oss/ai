<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search Assistant</title>
    <style>
        /* Modern Royal Navy & Gold UI */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, #001f3f 0%, #000b18 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            margin-top: 50px;
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        h1 { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        .search-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid #FFD700;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            background: #FFD700;
            color: #001f3f;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #e6c200; transform: scale(1.05); }

        #results {
            margin-top: 30px;
            text-align: left;
            width: 100%;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 15px;
            padding: 15px;
            border-left: 4px solid #FFD700;
            border-radius: 5px;
        }

        .result-card a { color: #FFD700; text-decoration: none; font-size: 18px; font-weight: bold; }
        .result-card p { color: #ccc; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Search AI</h1>
    <div class="search-box">
        <input type="text" id="query" placeholder="Poochiye jo aap chahte hain...">
        <button onclick="performSearch()">Search</button>
    </div>

    <div id="results">
        </div>
</div>

<script>
    async function performSearch() {
        const query = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        
        if (!query) return alert("Kuch toh likhen!");

        resultsDiv.innerHTML = "<p style='color:#FFD700;'>Searching Google (via DDG Proxy)...</p>";

        try {
            // Hum DuckDuckGo ki free JSON api use kar rahe hain jo browser allow karta hai
            const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&pretty=1`);
            const data = await response.json();

            resultsDiv.innerHTML = ""; // Clear loader

            // Agar koi direct answer (Abstract) mila
            if (data.AbstractText) {
                resultsDiv.innerHTML += `
                    <div class="result-card">
                        <a href="${data.AbstractURL}" target="_blank">Direct Answer</a>
                        <p>${data.AbstractText}</p>
                    </div>`;
            }

            // Related Topics (Search results ki tarah)
            if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                data.RelatedTopics.slice(0, 5).forEach(item => {
                    if (item.Text) {
                        resultsDiv.innerHTML += `
                            <div class="result-card">
                                <a href="${item.FirstURL}" target="_blank">${item.Text.split(' - ')[0] || 'Result'}</a>
                                <p>${item.Text}</p>
                            </div>`;
                    }
                });
            } else if (!data.AbstractText) {
                resultsDiv.innerHTML = "<p>Maaf kijiye, koi data nahi mila. Try another query.</p>";
            }

        } catch (error) {
            resultsDiv.innerHTML = "<p style='color:red;'>Error fetching data. Check connection.</p>";
            console.error(error);
        }
    }
</script>

</body>
</html>
